<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <title>Daily Blessing - BibleSphere</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#b08d57">
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        margin: 0;
        padding: 15px;
        color: #2c3e50;
      }

      /* HEADER */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .homebtn {
        text-decoration: none;
        background: #b08d57;
        color: white;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: bold;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        transition: 0.2s;
      }

      .homebtn:hover {
        background: #9a7847;
      }

      h2 {
        margin: 0;
        font-size: 38px;
        text-align: center;
        flex: 1;
        font-weight: 700;
      }

      /* EVENT */
      .event-badge {
        display: inline-block;
        background: #fff2cc;
        color: #8a6d3b;
        padding: 8px 14px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 15px;
      }

      /* CARDS */
      .verse-card,
      .quiz-card {
        background: white;
        padding: 22px;
        border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
      }

      /* VERSE */
      .verse-text {
        font-size: 22px;
        line-height: 1.9;
        color: #333;
        margin-bottom: 15px;
      }

      .verse-ref {
        font-weight: bold;
        color: #1565c0;
        font-size: 18px;
      }

      /* QUIZ */
      .quiz-question {
        font-size: 22px;
        margin-bottom: 18px;
        line-height: 1.7;
      }

      .option {
        display: block;
        background: #e3f2fd;
        margin: 8px 0;
        padding: 14px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
        user-select: none;
      }

      .option:hover {
        background: #bbdefb;
      }

      .correct {
        background: #c8e6c9 !important;
      }

      .wrong {
        background: #ffcdd2 !important;
      }

      /* OFFLINE */
      .offline-status {
        display: none;
        margin-top: 10px;
        font-size: 14px;
        color: #d32f2f;
        font-weight: bold;
      }

      /* MOBILE */
      @media(max-width:700px) {
        body {
          padding: 10px;
        }

        h2 {
          font-size: 30px;
        }

        .verse-card,
        .quiz-card {
          padding: 18px;
        }

        .verse-text {
          font-size: 18px;
          line-height: 1.8;
        }

        .quiz-question {
          font-size: 18px;
        }

        .option {
          font-size: 16px;
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="topbar">
      <a href="../index.html" class="homebtn"> 🏠 Home </a>
      <h2>Daily Blessing</h2>
    </div>
    <!-- VERSE CARD -->
    <div class="verse-card">
      <div id="eventBadge" class="event-badge" style="display:none;"></div>
      <h3>📖 Today's Verse</h3>
      <div id="verseText" class="verse-text"> Loading verse... </div>
      <div id="verseRef" class="verse-ref"></div>
      <div id="offlineStatus" class="offline-status"> Offline mode enabled </div>
    </div>
    <!-- QUIZ CARD -->
    <div class="quiz-card">
      <h3>🧠 Daily Quiz</h3>
      <div id="quizQuestion" class="quiz-question"> Loading quiz... </div>
      <div id="quizOptions"></div>
    </div>
