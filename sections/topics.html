<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">

<title>Nave's Topical Dictionary - BibleSphere</title>

<link rel="manifest" href="../manifest.json">

<meta name="theme-color" content="#b08d57">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,sans-serif;
background:#f4f6fb;
padding:15px;
margin:0;
font-size:18px;
color:#2c3e50;
}

/* HEADER */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
flex-wrap:wrap;
gap:10px;
}

.homebtn{
text-decoration:none;
background:#b08d57;
color:white;
padding:10px 16px;
border-radius:10px;
font-size:15px;
font-weight:bold;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

h2{
margin:0;
font-size:38px;
text-align:center;
flex:1;
font-weight:700;
}

/* SEARCH AREA */

.search-area{
position:sticky;
top:0;
z-index:50;
background:#f4f6fb;
padding-bottom:10px;
}

/* SEARCH */

.search-box{
margin-bottom:15px;
}

.search-box input{
width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

/* ALPHABET */

.alphabet-bar{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
margin-bottom:15px;
}

.alpha-btn{
background:#e3e8ff;
padding:7px 10px;
border-radius:7px;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

.alpha-btn:hover{
background:#cfd7ff;
}

/* STATUS */

.status{
font-weight:bold;
margin-bottom:12px;
color:#555;
font-size:15px;
}

/* RESULTS */

.result-card{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:18px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
max-width:1100px;
margin-left:auto;
margin-right:auto;
overflow-wrap:break-word;
}

.result-card h3{
margin:0 0 15px 0;
color:#2c3e50;
font-size:30px;
}

/* REFERENCES */

.reference-container{
display:flex;
flex-wrap:wrap;
}

.reference-chip{
display:inline-flex;
align-items:center;
justify-content:center;
background:#e3f2fd;
color:#1565c0;
padding:12px 16px;
margin:6px 6px 6px 0;
border-radius:25px;
font-size:18px;
font-weight:500;
cursor:pointer;
transition:0.2s;
min-height:44px;
line-height:1.4;
}

.reference-chip:hover{
background:#bbdefb;
}

.topic-text{
margin:10px 0;
font-weight:500;
line-height:1.7;
}

/* EMPTY */

.no-result{
text-align:center;
color:#888;
margin-top:30px;
font-size:18px;
}

/* MOBILE */

@media(max-width:700px){

body{
padding:10px;
font-size:16px;
}

h2{
font-size:30px;
}

.search-box input{
font-size:16px;
padding:12px;
}

.result-card{
padding:16px;
}

.result-card h3{
font-size:25px;
}

.reference-chip{
font-size:15px;
padding:10px 14px;
}

.topic-text{
font-size:15px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="topbar">

<a href="../index.html"
class="homebtn">

🏠 Home

</a>

<h2>Nave’s Topical Dictionary</h2>

</div>

<!-- SEARCH AREA -->

<div class="search-area">

<!-- SEARCH -->

<div class="search-box">

<input type="text"
id="searchInput"

placeholder="Search topic (e.g., AARON, FAITH, LOVE)"

onkeyup="searchTopic()">

</div>

<!-- ALPHABET -->

<div class="alphabet-bar"
id="alphabetBar">

</div>

</div>

<!-- STATUS -->

<div class="status"
id="status">

Loading topics...

</div>

<!-- RESULTS -->

<div id="results"></div>
