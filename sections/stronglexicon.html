<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=5">

<title>Strong's Lexicon - BibleSphere</title>

<link rel="manifest" href="../manifest.json">

<meta name="theme-color" content="#b08d57">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,sans-serif;
background:#f4f6fb;
padding:15px;
margin:0;
color:#2c3e50;
}

/* HEADER */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
flex-wrap:wrap;
gap:10px;
}

.homebtn{
text-decoration:none;
background:#b08d57;
color:white;
padding:10px 16px;
border-radius:10px;
font-size:15px;
font-weight:bold;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

h2{
margin:0;
font-size:38px;
text-align:center;
flex:1;
font-weight:700;
}

/* SEARCH AREA */

.search-area{
position:sticky;
top:0;
z-index:50;
background:#f4f6fb;
padding-bottom:10px;
}

/* TOGGLE */

.toggle-container{
display:flex;
gap:10px;
margin-bottom:15px;
}

.toggle-btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:#e0e0e0;
font-size:16px;
transition:0.2s;
}

.toggle-btn.active{
background:#3498db;
color:white;
}

/* SEARCH */

.search-box input{
width:100%;
padding:14px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* ALPHABET */

.alphabet-bar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:15px;
justify-content:center;
}

.alpha-btn{
padding:7px 10px;
border-radius:7px;
background:#e3e8ff;
cursor:pointer;
font-size:13px;
transition:0.2s;
}

.alpha-btn:hover{
background:#cfd7ff;
}

/* STATUS */

.status{
font-weight:bold;
margin-bottom:12px;
color:#555;
font-size:15px;
}

/* RESULT CARDS */

.result-card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
max-width:1100px;
margin-left:auto;
margin-right:auto;
overflow-wrap:break-word;
}

.result-card h3{
margin:0 0 10px 0;
color:#2c3e50;
font-size:28px;
}

.label{
font-weight:bold;
color:#444;
}

.result-card p{
line-height:1.8;
font-size:18px;
}

/* NO RESULT */

.no-result{
text-align:center;
color:#888;
margin-top:30px;
font-size:18px;
}

/* MOBILE */

@media(max-width:700px){

body{
padding:10px;
}

h2{
font-size:30px;
}

.toggle-btn{
font-size:15px;
padding:10px;
}

.search-box input{
font-size:15px;
padding:12px;
}

.result-card{
padding:15px;
}

.result-card h3{
font-size:24px;
}

.result-card p{
font-size:16px;
line-height:1.7;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="topbar">

<a href="../index.html" class="homebtn">
🏠 Home
</a>

<h2>Strong’s Lexicon</h2>

</div>

<!-- SEARCH AREA -->

<div class="search-area">

<!-- TOGGLE -->

<div class="toggle-container">

<button id="greekBtn"
class="toggle-btn active"
onclick="switchLanguage('greek')">

Greek (G)

</button>

<button id="hebrewBtn"
class="toggle-btn"
onclick="switchLanguage('hebrew')">

Hebrew (H)

</button>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text"
id="searchInput"

placeholder="Search G3056, H7225, word, meaning..."

onkeyup="debouncedSearch()">

</div>

<!-- ALPHABET -->

<div class="alphabet-bar"
id="alphabetBar">
</div>

</div>

<!-- STATUS -->

<div class="status"
id="status">

Loading lexicon...

</div>

<!-- RESULTS -->

<div id="results"></div>
